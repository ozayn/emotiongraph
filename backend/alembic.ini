# Alembic configuration for EmotionGraph (see backend/MIGRATIONS.md).
# The real DATABASE_URL is set at runtime from app.config via env.py and app.db.ensure_schema_via_alembic.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os
version_path_separator = os

# Placeholder only — env.py and programmatic upgrades override this with settings.database_url.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
