<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var k = "emotiongraph-theme";
          var p = localStorage.getItem(k);
          if (p !== "light" && p !== "dark" && p !== "system") p = "system";
          var dark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var t = p === "light" ? "light" : p === "dark" ? "dark" : dark ? "dark" : "light";
          document.documentElement.setAttribute("data-theme", t);
          document.documentElement.style.colorScheme = t;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute("content", t === "dark" ? "#1e1d21" : "#ebe8e0");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ebe8e0" />
    <meta name="application-name" content="EmotionGraph" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EmotionGraph" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="msapplication-TileColor" content="#ebe8e0" />
    <meta
      name="description"
      content="EmotionGraph — quick voice notes turned into structured daily log entries you can review and save."
    />
    <meta property="og:title" content="EmotionGraph" />
    <meta
      property="og:description"
      content="Voice notes to structured daily logs. Review before saving."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://emotiongraph.ozayn.com/" />
    <meta name="twitter:card" content="summary" />
    <link rel="canonical" href="https://emotiongraph.ozayn.com/" />
    <link rel="icon" href="/logo-mark.svg" type="image/svg+xml" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>EmotionGraph</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
